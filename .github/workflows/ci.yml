name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            # aarch64 is cross-compiled and its tests run under qemu-user.
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy
          rustup target add ${{ matrix.target }}

      - name: Install aarch64 cross toolchain + qemu
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user

      - name: Configure aarch64 linker + qemu runner
        if: matrix.cross
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUNNER=qemu-aarch64 -L /usr/aarch64-linux-gnu" >> "$GITHUB_ENV"

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} --all-targets -- -D warnings

      # Default (no features) is the real no_std configuration: the crate is
      # `#![no_std]` here, so an accidental `std::`/`alloc::` reference in
      # library code fails to compile. `--no-default-features` makes that intent
      # explicit even if a default feature is added later.
      - name: Build (no_std)
        run: cargo build --target ${{ matrix.target }} --no-default-features

      # Also build the opt-in `std` interop feature so it cannot rot.
      - name: Build (std feature)
        run: cargo build --target ${{ matrix.target }} --features std

      # The fork/setsid/execve and signal-delivery tests mutate process-global
      # state and fork the (otherwise multithreaded) harness; running the suite
      # single-threaded makes the process effectively single-threaded at each
      # fork point and removes cross-test races on shared state.
      - name: Test
        run: cargo test --target ${{ matrix.target }} -- --test-threads=1

  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Doc (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

  msrv:
    name: msrv (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install 1.88 toolchain
        run: rustup toolchain install 1.88 --profile minimal
      - name: Build on MSRV
        run: cargo +1.88 build --no-default-features
      - name: Build on MSRV (std feature)
        run: cargo +1.88 build --features std
