name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Phase 1 targets x86_64 only; the crate emits a compile_error! on other
  # arches. Phase 5 adds the aarch64 syscall table and an emulated runner, and
  # expands this into a build+test matrix.
  test:
    name: test (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (no_std)
        run: cargo build

      - name: Test
        run: cargo test
